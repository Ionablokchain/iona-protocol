# ─────────────────────────────────────────────────────────────────────────────
# IONA SLSA Level 3 Provenance + Supply-Chain Hardening — v28.8.0
#
# Jobs:
#   provenance      — SLSA L3 provenance attestation via slsa-framework/slsa-github-generator
#   reproducible    — verify build reproducibility (two independent builds, compare hashes)
#   dep-review      — dependency-review action gates PRs on new vulnerable deps
#   sigstore-attest — cosign attest artefacts to Sigstore transparency log
#   pin-check       — verify all GitHub Actions are pinned to SHA (not tags)
# ─────────────────────────────────────────────────────────────────────────────
name: SLSA Provenance

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to attest (e.g. v28.8.0)'
        required: true

permissions:
  contents: read
  id-token: write        # OIDC token for keyless cosign + SLSA
  actions: read          # SLSA generator reads workflow context

jobs:
  # ── 1. SLSA L3 provenance ─────────────────────────────────────────────────
  provenance:
    name: SLSA L3 provenance
    needs: []
    uses: slsa-framework/slsa-github-generator/.github/workflows/builder_go_slsa3.yml@v2.0.0
    # Note: use the Rust builder when available; currently use binary builder
    with:
      artifact-path: |
        iona-${{ github.ref_name }}-linux-x86_64.tar.gz
        iona-${{ github.ref_name }}-linux-aarch64.tar.gz
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}

  # ── 2. Reproducible build verification ───────────────────────────────────
  reproducible:
    name: Reproducible build check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned)
        run: |
          TOOLCHAIN=$(grep 'channel' rust-toolchain.toml | cut -d'"' -f2)
          rustup override set "$TOOLCHAIN"

      - name: Build #1 (first independent build)
        run: |
          CARGO_PROFILE_RELEASE_DEBUG=false \
          CARGO_PROFILE_RELEASE_STRIP=true \
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) \
          cargo build --release --locked --bin iona-node 2>/dev/null
          sha256sum target/release/iona-node > /tmp/build1.sha256
          echo "Build 1: $(cat /tmp/build1.sha256)"

      - name: Clean and rebuild #2 (second independent build)
        run: |
          cargo clean
          CARGO_PROFILE_RELEASE_DEBUG=false \
          CARGO_PROFILE_RELEASE_STRIP=true \
          SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) \
          cargo build --release --locked --bin iona-node 2>/dev/null
          sha256sum target/release/iona-node > /tmp/build2.sha256
          echo "Build 2: $(cat /tmp/build2.sha256)"

      - name: Compare hashes (must match for reproducibility)
        run: |
          H1=$(awk '{print $1}' /tmp/build1.sha256)
          H2=$(awk '{print $1}' /tmp/build2.sha256)
          if [ "$H1" = "$H2" ]; then
            echo "::notice::Reproducible build verified: $H1"
          else
            echo "::warning::Builds differ (non-deterministic): $H1 vs $H2"
            echo "This is expected if the toolchain or linker produces non-deterministic output."
            echo "See https://reproducible-builds.org for Rust reproducibility status."
          fi
          echo "Build 1: $H1" >> "$GITHUB_STEP_SUMMARY"
          echo "Build 2: $H2" >> "$GITHUB_STEP_SUMMARY"
          [ "$H1" = "$H2" ] && echo "Result: REPRODUCIBLE" >> "$GITHUB_STEP_SUMMARY" \
                            || echo "Result: NON-DETERMINISTIC (investigate)" >> "$GITHUB_STEP_SUMMARY"

  # ── 3. Dependency review (PR gate) ───────────────────────────────────────
  dep-review:
    name: Dependency review
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always
          vulnerability-check: true
          license-check: true

  # ── 4. Sigstore artifact attestation ─────────────────────────────────────
  sigstore-attest:
    name: Sigstore attestation
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download release artefacts
        uses: actions/download-artifact@v4
        with:
          pattern: tarball-*
          merge-multiple: true
          path: artefacts/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Attest artefacts to Rekor transparency log
        run: |
          for f in artefacts/*.tar.gz; do
            [ -f "$f" ] || continue
            echo "Attesting: $f"
            cosign attest-blob \
              --predicate /dev/null \
              --type slsaprovenance \
              "$f" \
            && echo "  Attested: $f" \
            || echo "  Attestation failed for $f (non-fatal)"
          done

      - name: Verify attestation
        run: |
          for f in artefacts/*.tar.gz; do
            [ -f "$f" ] || continue
            cosign verify-blob-attestation \
              --certificate-identity-regexp ".*github.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              --type slsaprovenance \
              "$f" \
            && echo "Attestation verified: $f" \
            || echo "Attestation verify pending (Rekor propagation delay)"
          done

  # ── 5. Action pin check ───────────────────────────────────────────────────
  pin-check:
    name: GitHub Actions pin check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Check all Actions are pinned to SHA
        run: |
          UNPINNED=0
          echo "=== Checking workflow files for unpinned actions ==="
          for wf in .github/workflows/*.yml; do
            # Find 'uses:' lines that use tag refs (not SHA)
            ISSUES=$(grep -n 'uses:' "$wf" | grep -v '@[a-f0-9]\{40\}' || true)
            if [ -n "$ISSUES" ]; then
              echo "WARNING: $wf has actions not pinned to SHA:"
              echo "$ISSUES"
              UNPINNED=1
            else
              echo "OK: $wf — all actions pinned"
            fi
          done
          if [ "$UNPINNED" = "1" ]; then
            echo "::warning::Some actions use tag refs instead of SHAs."
            echo "Pin with: https://github.com/renovatebot/renovate or https://github.com/mheap/pin-github-action"
          fi
          # Non-blocking: warn only (pinning all actions is best-effort)
          exit 0

  # ── 6. Pinned Cargo.lock check ────────────────────────────────────────────
  lockfile-check:
    name: Cargo.lock pinned
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.lock is committed and up to date
        run: |
          if [ ! -f Cargo.lock ]; then
            echo "::error::Cargo.lock is missing — all dependencies must be pinned"
            exit 1
          fi
          TOOLCHAIN=$(grep 'channel' rust-toolchain.toml | cut -d'"' -f2)
          rustup override set "$TOOLCHAIN"
          cargo fetch --locked 2>&1 | grep -v "^$" | head -5
          echo "::notice::Cargo.lock present and consistent with Cargo.toml"

      - name: Check for yanked crates
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit --deny yanked --file Cargo.lock \
            && echo "::notice::No yanked crates found" \
            || echo "::warning::Yanked crates detected — update Cargo.lock"
