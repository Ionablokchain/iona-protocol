name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
          components: rustfmt, clippy

      - name: Build release binary
        run: cargo build --release --locked --bin iona-node

      - name: Package release artifact
        run: |
          mkdir -p dist
          cp target/release/iona-node dist/iona-node
          tar -czf dist/iona-${GITHUB_REF_NAME}.tar.gz -C dist iona-node

      - name: Generate SBOM
        run: |
          cargo install cargo-cyclonedx --locked || true
          cargo cyclonedx --format json --output-file dist/sbom.json || \
            echo '{"bomFormat":"CycloneDX","specVersion":"1.4","components":[]}' > dist/sbom.json

      - name: Generate SHA256 hashes
        run: |
          cd dist
          sha256sum iona-${GITHUB_REF_NAME}.tar.gz > SHA256SUMS.txt
          sha256sum sbom.json >> SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: iona-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/iona-${{ github.ref_name }}.tar.gz
            dist/sbom.json
            dist/SHA256SUMS.txt
