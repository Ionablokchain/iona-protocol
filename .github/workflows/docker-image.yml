# Docker Image CI for IONA
#
# This workflow builds the Docker image for the IONA node on every push to `main`
# and on pull requests. It uses Docker caching to speed up builds and optionally
# pushes to GitHub Container Registry (GHCR) on tags or pushes to `main`.
#
# Environment variables:
#   - REGISTRY: container registry (default: ghcr.io)
#   - IMAGE_NAME: name of the image (default: ${{ github.repository }})
#
# Secrets:
#   - GHCR_TOKEN: token for pushing to GitHub Container Registry (if enabled)

name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'               # Trigger on version tags (e.g., v28.1.0)
  pull_request:
    branches: [ "main" ]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # -------------------------------------------------------------------------
  # Build and test the Docker image
  # -------------------------------------------------------------------------
  build-and-test:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest
    # Grant write permissions for the GitHub token to push to registry
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Set up Docker Buildx for advanced features (caching, multi-platform)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry (only if pushing to main or on tag)
      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and optionally push the Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}

      # Optional: Run a quick smoke test on the built image
      - name: Smoke test Docker image
        if: github.event_name != 'pull_request'
        run: |
          docker run --rm ${{ steps.meta.outputs.tags }} --version
          docker run --rm ${{ steps.meta.outputs.tags }} --help

  # -------------------------------------------------------------------------
  # Security scan (optional, can be added as a separate job)
  # -------------------------------------------------------------------------
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
