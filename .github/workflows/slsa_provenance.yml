name: SLSA Release Attestation

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  attest-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: iona-${{ github.ref_name }}
          path: dist

      - name: Verify artifact exists
        run: |
          test -f "dist/iona-${GITHUB_REF_NAME}.tar.gz"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: dist/iona-${{ github.ref_name }}.tar.gz
