# ─────────────────────────────────────────────────────────────────────────────
# IONA Security Workflow
#
# Triggers:
#   - Every push to main/develop
#   - Every PR targeting main
#   - Weekly schedule (Saturday 03:00 UTC) — catches newly published advisories
#   - Manual dispatch
#
# Jobs:
#   audit    — cargo-audit: check Cargo.lock against RustSec advisory DB
#   deny     — cargo-deny: license compliance + bans + advisories + sources
#   fuzz     — fuzz smoke test (30s per target, 4 targets, nightly Rust)
#   sbom     — generate + validate CycloneDX SBOM
#   secrets  — gitleaks secret scanning
# ─────────────────────────────────────────────────────────────────────────────
name: Security

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 6"   # Saturday 03:00 UTC — weekly advisory rescan
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # ── 1. cargo-audit ────────────────────────────────────────────────────────
  audit:
    name: cargo-audit (RustSec)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: |
          cargo audit \
            --deny warnings \
            --deny unsound \
            --file Cargo.lock \
            --json 2>&1 | tee audit-output.json || AUDIT_FAILED=1

          # Pretty print summary regardless of exit
          echo "=== Audit Summary ==="
          if command -v jq &>/dev/null; then
            jq -r '
              .vulnerabilities.list[] |
              "[\(.advisory.severity // "unknown")] \(.advisory.id): \(.advisory.title)\n  Crate: \(.package.name)@\(.package.version)\n  URL: \(.advisory.url // "n/a")\n"
            ' audit-output.json 2>/dev/null || echo "(no vulnerabilities found)"
          fi

          if [ "${AUDIT_FAILED:-0}" = "1" ]; then
            echo ""
            echo "::error::cargo-audit found vulnerabilities. Review audit-output.json."
            exit 1
          fi
          echo "::notice::cargo-audit passed — no known vulnerabilities"

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-results
          path: audit-output.json
          retention-days: 30

  # ── 2. cargo-deny ─────────────────────────────────────────────────────────
  deny:
    name: cargo-deny (licenses + bans + advisories)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check — licenses
        run: cargo deny check licenses

      - name: cargo deny check — bans (duplicate crates)
        run: cargo deny check bans

      - name: cargo deny check — advisories
        run: cargo deny check advisories

      - name: cargo deny check — sources (registry + git)
        run: cargo deny check sources

      - name: cargo deny check — all (combined, fail-fast off)
        if: always()
        run: cargo deny check --exclude-dev || true
        # Combined run gives full picture even if individual checks pass

  # ── 3. fuzz smoke tests ───────────────────────────────────────────────────
  fuzz:
    name: Fuzz smoke — ${{ matrix.target }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - state_transition
          - rpc_parse
          - block_decode
          - p2p_message
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust (required for cargo-fuzz)
        run: |
          rustup toolchain install nightly --component llvm-tools-preview
          rustup override set nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target/
          key: ${{ runner.os }}-fuzz-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run fuzz smoke test (30 seconds)
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} \
            -- \
            -max_total_time=30 \
            -max_len=4096 \
            -timeout=10 \
            -print_final_stats=1 \
            2>&1 | tee fuzz-output-${{ matrix.target }}.txt

          # Fail if any crash artefacts were produced
          CRASHES=$(find fuzz/artifacts/${{ matrix.target }}/ -type f 2>/dev/null | wc -l)
          if [ "$CRASHES" -gt 0 ]; then
            echo "::error::Fuzzer found $CRASHES crash(es) in ${{ matrix.target }}!"
            echo "Crash files:"
            ls fuzz/artifacts/${{ matrix.target }}/
            echo "Re-run with: cargo +nightly fuzz run ${{ matrix.target }} fuzz/artifacts/${{ matrix.target }}/<crash-file>"
            exit 1
          fi
          echo "::notice::Fuzz smoke passed for ${{ matrix.target }} — 0 crashes"

      - name: Upload fuzz output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-output-${{ matrix.target }}
          path: |
            fuzz-output-${{ matrix.target }}.txt
            fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30

      - name: Upload crash artefacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 90

  # ── 4. SBOM generation + validation ──────────────────────────────────────
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup override set $(grep 'channel' rust-toolchain.toml | cut -d'"' -f2)

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM
        run: |
          cargo cyclonedx \
            --format json \
            --output sbom.cdx.json
          echo "SBOM generated: $(wc -c < sbom.cdx.json) bytes"

      - name: Validate SBOM structure
        run: |
          python3 -c "
          import json, sys
          with open('sbom.cdx.json') as f:
              sbom = json.load(f)
          assert sbom.get('bomFormat') == 'CycloneDX', 'bomFormat must be CycloneDX'
          assert sbom.get('specVersion') in ['1.4', '1.5', '1.6'], f'Unexpected specVersion: {sbom.get(\"specVersion\")}'
          comps = sbom.get('components', [])
          assert len(comps) > 0, 'No components found in SBOM'
          print(f'SBOM valid: {len(comps)} components, specVersion={sbom[\"specVersion\"]}')
          # Check each component has required fields
          for c in comps:
              assert 'name' in c, f'Component missing name: {c}'
              assert 'version' in c, f'Component missing version: {c}'
          print('All component fields valid.')
          "

      - name: Scan SBOM for CVEs (grype)
        run: |
          # Install grype
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          # Scan (non-blocking in CI — report only)
          grype sbom:sbom.cdx.json --output table 2>&1 | tee grype-results.txt || true
          # Fail on critical CVEs
          if grype sbom:sbom.cdx.json --fail-on critical --quiet 2>/dev/null; then
            echo "::notice::No critical CVEs found in SBOM"
          else
            echo "::error::Critical CVEs found! Review grype-results.txt"
            exit 1
          fi

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.cdx.json
            grype-results.txt
          retention-days: 90

  # ── 5. Secret scanning (gitleaks) ────────────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for complete scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional for org repos

  # ── Summary gate ──────────────────────────────────────────────────────────
  security-gate:
    name: Security gate
    needs: [audit, deny, sbom, secrets]
    if: always()
    runs-on: ubuntu-22.04
    steps:
      - name: Check all security jobs passed
        run: |
          AUDIT="${{ needs.audit.result }}"
          DENY="${{ needs.deny.result }}"
          SBOM="${{ needs.sbom.result }}"
          SECRETS="${{ needs.secrets.result }}"

          echo "audit:   $AUDIT"
          echo "deny:    $DENY"
          echo "sbom:    $SBOM"
          echo "secrets: $SECRETS"

          if [[ "$AUDIT" != "success" ]] || \
             [[ "$DENY" != "success" ]]  || \
             [[ "$SBOM" != "success" ]]  || \
             [[ "$SECRETS" != "success" && "$SECRETS" != "skipped" ]]; then
            echo "::error::One or more security checks failed. Blocking merge."
            exit 1
          fi
          echo "::notice::All security checks passed ✓"
