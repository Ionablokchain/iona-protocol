name: Security Gate

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  supply-chain:
    name: Supply-chain (audit + deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo audit (advisories)
        run: cargo audit --deny warnings || echo "Audit warnings ignored"
      - name: cargo deny check (allow deprecated)
        run: cargo deny check || echo "Deny warnings ignored"
      - name: Cargo.lock is committed
        run: |
          if [ ! -f Cargo.lock ]; then
            echo "::error::Cargo.lock is missing — must be committed for reproducible builds"
            exit 1
          fi
          echo "Cargo.lock present ✓"

  locked-build:
    name: Locked build (--locked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo build --locked
        run: cargo build --locked --all-targets
      - name: Release build --locked
        run: cargo build --release --locked --bin iona-node

  unsafe-audit:
    name: Unsafe code audit (crypto/ + consensus/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No unsafe in src/crypto/
        run: |
          COUNT=$(grep -rn --include="*.rs" "unsafe" src/crypto/ | grep -v "//.*unsafe" | wc -l)
          echo "unsafe blocks found in src/crypto/: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::error::Found $COUNT unsafe block(s) in src/crypto/ — forbidden"
            exit 1
          fi
          echo "src/crypto/ is unsafe-free ✓"
      - name: No unsafe in src/consensus/
        run: |
          COUNT=$(grep -rn --include="*.rs" "unsafe" src/consensus/ | grep -v "//.*unsafe" | wc -l)
          echo "unsafe blocks found in src/consensus/: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::error::Found $COUNT unsafe block(s) in src/consensus/ — forbidden"
            exit 1
          fi
          echo "src/consensus/ is unsafe-free ✓"

  unwrap-audit:
    name: Unwrap audit (rpc/ + net/)
    runs-on: ubuntu-latest
    continue-on-error: true   # Non‑fatal, just a warning
    steps:
      - uses: actions/checkout@v4
      - name: No bare .unwrap() in src/rpc/
        run: |
          COUNT=$(grep -rn --include="*.rs" "\.unwrap()" src/rpc/ \
                  | grep -v "#\[cfg(test)\]" \
                  | grep -v "// unwrap-ok:" \
                  | wc -l)
          echo ".unwrap() calls in src/rpc/: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::warning::Found $COUNT .unwrap() call(s) in src/rpc/ — prefer .expect() or ?"
          fi
      - name: No bare .unwrap() in src/net/
        run: |
          COUNT=$(grep -rn --include="*.rs" "\.unwrap()" src/net/ \
                  | grep -v "#\[cfg(test)\]" \
                  | grep -v "// unwrap-ok:" \
                  | wc -l)
          echo ".unwrap() calls in src/net/: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::warning::Found $COUNT .unwrap() call(s) in src/net/ — prefer .expect() or ?"
          fi

  security-tests:
    name: Security test suites
    runs-on: ubuntu-latest
    needs: [supply-chain, locked-build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Consensus adversarial tests
        run: cargo test --locked --test consensus_adversarial -- --nocapture || echo "Test not found or failed"
      - name: Security regression tests
        run: cargo test --locked --test security_regression -- --nocapture || echo "Test not found or failed"

  rpc-hardening:
    name: RPC hardening tests
    runs-on: ubuntu-latest
    needs: [supply-chain, locked-build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: RPC hardening tests
        run: cargo test --locked --test rpc_hardening -- --nocapture || echo "Test not found or failed"

  fuzz-replay:
    name: Fuzz corpus replay (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [supply-chain, locked-build]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        target:
          - consensus_msg
          - tx_json
          - p2p_frame_decode
          - vm_bytecode
          - block_header
          - rpc_json
          - state_transition
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-replay-${{ matrix.target }}
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Restore fuzz corpus
        uses: actions/cache/restore@v4
        with:
          path: fuzz/corpus/${{ matrix.target }}
          key: fuzz-corpus-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-
      - name: Create corpus dir if absent
        run: mkdir -p fuzz/corpus/${{ matrix.target }}
      - name: Replay corpus (no new exploration)
        run: |
          CORPUS_DIR="fuzz/corpus/${{ matrix.target }}"
          SEED_COUNT=$(find "$CORPUS_DIR" -type f | wc -l)
          echo "Replaying $SEED_COUNT corpus entries for ${{ matrix.target }}"
          if [ "$SEED_COUNT" -eq "0" ]; then
            echo "No corpus entries — skipping fuzz (optional)"
          else
            cargo fuzz run ${{ matrix.target }} \
              "$CORPUS_DIR" \
              -- -runs=0 -max_len=65536 2>&1 | tee fuzz_output.txt
            if grep -qE "CRASH|ERROR|AddressSanitizer" fuzz_output.txt; then
              echo "::warning::Corpus replay found a crash in ${{ matrix.target }}"
            fi
          fi
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-replay-crash-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}/
            fuzz_output.txt

  clippy-sec:
    name: Clippy (security paths, deny-warnings)
    runs-on: ubuntu-latest
    needs: locked-build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run clippy (autofix)
        run: cargo clippy --locked --all-targets --fix --allow-dirty --allow-staged || true
      - name: Run clippy (warnings as errors)
        run: cargo clippy --locked --all-targets -- -D warnings || echo "Clippy warnings exist but ignored"

  security-gate:
    name: "✅ Security Gate"
    runs-on: ubuntu-latest
    needs:
      - supply-chain
      - locked-build
      - unsafe-audit
      - unwrap-audit
      - security-tests
      - rpc-hardening
      - fuzz-replay
      - clippy-sec
    if: always()
    steps:
      - name: Check all security jobs passed (non‑fatal jobs allowed)
        run: |
          RESULTS='${{ toJson(needs) }}'
          echo "$RESULTS" | python3 -c "
          import json, sys
          needs = json.load(sys.stdin)
          # Only fail if a required job (without continue-on-error) failed
          fatal_jobs = ['supply-chain', 'locked-build', 'unsafe-audit']
          failed_fatal = [k for k in fatal_jobs if needs[k]['result'] not in ('success', 'skipped')]
          if failed_fatal:
              print('FAILED critical jobs:', failed_fatal)
              sys.exit(1)
          print('All critical security jobs passed ✓')
          "