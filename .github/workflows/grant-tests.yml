name: Grant tests – Determinism & Upgrade safety

on:
  push:
    branches: [ main, grant ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # permite rularea manuală

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 1. Build și teste unitare de bază
  build-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          components: rustfmt, clippy
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
      - name: Build all crates
        run: cargo build --release --all-targets
      - name: Run unit tests
        run: cargo test --release --lib --bins

  # 2. Teste de determinism (replay cross-platform)
  determinism-replay:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-determinism
      - name: Build determinism test tool
        run: cargo build --release -p iona-tools --bin replay-verifier
      - name: Generate reference state (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ./target/release/replay-verifier generate --out ./test_data/ref_state.json
      - name: Replay and verify state on current OS
        run: |
          ./target/release/replay-verifier replay --input ./test_data/ref_state.json --check

  # 3. Teste de upgrade simulation
  upgrade-simulation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-upgrade
      - name: Build upgrade simulation tool
        run: cargo build --release -p iona-tools --bin upgrade-simulator
      - name: Run upgrade simulation (v1 → v2)
        run: |
          ./target/release/upgrade-simulator --genesis ./test_data/genesis_v1.json \
            --upgrade-plan ./test_data/upgrade_v2.yaml \
            --steps 10 \
            --check-rollback

  # 4. Smoke test – pornire nod local şi verificare RPC
  smoke-local-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Build iona-node
        run: cargo build --release -p iona-tools --bin iona-node
      - name: Start node in background
        run: |
          mkdir -p ./smoke_test_data
          cp ./config/example.toml ./smoke_test_data/config.toml
          ./target/release/iona-node --config ./smoke_test_data/config.toml &
          sleep 10
      - name: Check RPC endpoint
        run: |
          curl --fail http://localhost:26657/status || exit 1
          curl --fail http://localhost:26657/health || exit 1
      - name: (Optional) Check determinism endpoint
        run: |
          curl --fail http://localhost:26657/determinism/root || echo "No determinism endpoint yet"

  # 5. Chaos / fuzz – rapid (doar build, nu rulare full ca să nu consume mult timp)
  chaos-fuzz-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Build fuzz targets
        run: |
          cd fuzz
          cargo fuzz build
