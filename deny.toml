[graph]
targets = [
    { triple = "x86_64-pc-windows-msvc" },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Unlicense",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
exceptions = []

[advisories]
unmaintained = "workspace"
unsound = "workspace"
ignore = [
    "RUSTSEC-2026-0044",
    "RUSTSEC-2026-0045",
    "RUSTSEC-2026-0046",
    "RUSTSEC-2026-0047",
    "RUSTSEC-2026-0048",
    "RUSTSEC-2024-0437",
    "RUSTSEC-2026-0049",
    "RUSTSEC-2024-0375", # atty unmaintained
    "RUSTSEC-2021-0145", # atty unsound on Windows
    "RUSTSEC-2025-0141", # bincode unmaintained
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained
    "RUSTSEC-2026-0002", # lru unsound
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []