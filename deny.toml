# cargo-deny configuration for IONA.
#
# This file controls `cargo deny` checks for:
# - license compliance
# - security advisories
# - duplicate dependencies
# - crate sources
#
# Run: cargo deny check

# -----------------------------------------------------------------------------
# Licenses
# -----------------------------------------------------------------------------
[licenses]
# List of allowed licenses. All crates must have one of these.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "0BSD",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

# Licenses explicitly denied (GPL family is incompatible with Apache-2.0).
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
    "LGPL-2.0",
    "LGPL-2.1",
    "LGPL-3.0",
]

# Require explicit license text in Cargo.toml.
require_explicit = true

# If a crate has multiple licenses, require that all are allowed.
allow_openssl = true

# -----------------------------------------------------------------------------
# Security Advisories
# -----------------------------------------------------------------------------
[advisories]
# How to treat unmaintained crates.
unmaintained = "workspace"   # warn at workspace level

# How to treat unsound crates.
unsound = "workspace"

# Ignore specific advisories that have been reviewed and accepted.
ignore = [
    # 2026 batch currently tolerated until upstreams are updated
    "RUSTSEC-2026-0002", # lru unsound
    "RUSTSEC-2026-0044",
    "RUSTSEC-2026-0045",
    "RUSTSEC-2026-0046",
    "RUSTSEC-2026-0047",
    "RUSTSEC-2026-0048",
    "RUSTSEC-2026-0049",

    # Older transitive issues temporarily tolerated
    "RUSTSEC-2021-0145", # atty unsound on Windows
    "RUSTSEC-2024-0375", # atty unmaintained
    "RUSTSEC-2024-0437",
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained
    "RUSTSEC-2025-0141", # bincode unmaintained
]

# Vulnerability severity threshold (deny by default).
# severity-threshold = "medium"

# -----------------------------------------------------------------------------
# Crate Bans (duplicate versions, wildcards)
# -----------------------------------------------------------------------------
[bans]
# Warn when multiple versions of the same crate are used.
multiple-versions = "warn"

# Deny wildcard dependencies (e.g., `version = "*"`).
wildcards = "deny"

# Highlight all crates in duplicate reports.
highlight = "all"

# Explicitly skip certain crates from duplicate detection (if needed).
skip = []

# Skip entire trees of crates (if needed).
skip-tree = []

# List of crates that are allowed to have multiple versions.
# (Used when a conflict is unavoidable, e.g., two major versions of a crate.)
# allow-wildcard-paths = []

# -----------------------------------------------------------------------------
# Sources (where crates are fetched from)
# -----------------------------------------------------------------------------
[sources]
# Deny unknown registries (only crates.io allowed).
unknown-registry = "deny"

# Deny unknown git repositories (only explicit allowlist allowed).
unknown-git = "deny"

# Allow the official crates.io registry.
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# Allow specific git repositories (empty by default; add if needed).
allow-git = []

# -----------------------------------------------------------------------------
# Bans for specific crates (optional)
# -----------------------------------------------------------------------------
# [bans.deny]
# crates = []   # list of crate names to deny entirely
