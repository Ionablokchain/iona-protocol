# IONA v28 — RPC Node (public endpoint)
# Topology: val2, val3, val4 = producers; val1 = follower; rpc = public endpoint
# Chain: iona-testnet-1 (chain_id=6126151), launch=2026-03-01T12:00:00Z
#
# The RPC node does NOT produce blocks and does NOT participate in consensus.
# It connects to producers via bootnodes, syncs state, and exposes a public API.
# Put a reverse proxy (nginx/caddy) with TLS + rate limiting in front.

[node]
data_dir  = "/var/lib/iona/rpc"
seed      = 100                      # non-validator seed
chain_id  = 6126151
log_level = "info"
keystore  = "plain"                  # no signing needed for RPC

[consensus]
propose_timeout_ms   = 300
prevote_timeout_ms   = 200
precommit_timeout_ms = 200
max_txs_per_block    = 4096
gas_target           = 43000000
fast_quorum          = true
initial_base_fee     = 1
stake_each           = 1000
simple_producer      = false         # RPC node NEVER produces
validator_seeds      = [2, 3, 4]    # consensus participants (must match all nodes)

[network]
listen = "/ip4/0.0.0.0/tcp/30337"
# Connect to producers for state sync
peers = [
  "/ip4/10.0.1.2/tcp/30334",
  "/ip4/10.0.1.3/tcp/30335",
  "/ip4/10.0.1.4/tcp/30336",
]
bootnodes = [
  "/ip4/10.0.1.2/tcp/30334",
  "/ip4/10.0.1.3/tcp/30335",
]
enable_mdns = false
enable_kad  = true
reconnect_s = 30

max_connections_total    = 200
max_connections_per_peer = 8

# P2P state sync (fast bootstrap from peers)
enable_p2p_state_sync    = true
state_sync_chunk_bytes   = 1048576
state_sync_timeout_s     = 15

[mempool]
capacity = 200000

[rpc]
listen        = "0.0.0.0:9000"      # PUBLIC — put reverse proxy in front!
enable_faucet = true                 # Testnet faucet — protected by rate limiting (see deploy/nginx/rpc.conf)

[storage]
enable_snapshots         = true
snapshot_every_n_blocks  = 500
snapshot_keep            = 10
snapshot_zstd_level      = 3

[observability]
enable_otel    = false
otel_endpoint  = "http://127.0.0.1:4317"
service_name   = "iona-rpc"

[signing]
mode = "local"
