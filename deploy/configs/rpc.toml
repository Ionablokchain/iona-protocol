# IONA v28 — RPC Node Configuration (public endpoint)
# 
# Topology: val2, val3, val4 = block producers; val1 = follower; this node = public RPC endpoint
# Chain: iona-testnet-1 (chain_id = 6126151), launch = 2026-03-01T12:00:00Z
#
# The RPC node does NOT produce blocks and does NOT participate in consensus.
# It connects to producers via bootnodes, syncs state, and exposes a public API.
# IMPORTANT: Place a reverse proxy (nginx/Caddy) with TLS termination and rate limiting in front.

# ------------------------------
# Node identity and basic settings
# ------------------------------
[node]
data_dir  = "/var/lib/iona/rpc"          # Directory for chain data and snapshots
seed      = 100                           # Deterministic seed for node identity (non-validator)
chain_id  = 6126151                        # Must match genesis chain_id
log_level = "info"                         # Log verbosity (debug, info, warn, error)
keystore  = "plain"                         # No signing needed for RPC (plain = no encryption)

# ------------------------------
# Consensus engine (RPC node is a follower only)
# ------------------------------
[consensus]
propose_timeout_ms   = 300                  # Timeout for proposal step (ms)
prevote_timeout_ms   = 200                  # Timeout for prevote step (ms)
precommit_timeout_ms = 200                  # Timeout for precommit step (ms)
max_txs_per_block    = 4096                 # Maximum transactions per block
gas_target           = 43000000              # Target gas per block
fast_quorum          = true                  # Enable fast quorum (skip rounds)
initial_base_fee     = 1                     # Initial base fee per gas
stake_each           = 1000                  # Stake per validator (for fee calculations)
simple_producer      = false                  # RPC node NEVER produces blocks
validator_seeds      = [2, 3, 4]              # Seeds of the consensus participants (must match all nodes)

# ------------------------------
# P2P networking
# ------------------------------
[network]
listen = "/ip4/0.0.0.0/tcp/30337"            # P2P listen address (for incoming connections)

# Static peers for state sync (producers)
peers = [
  "/ip4/10.0.1.2/tcp/30334",                  # val2
  "/ip4/10.0.1.3/tcp/30335",                  # val3
  "/ip4/10.0.1.4/tcp/30336",                  # val4
]

# Bootnodes for initial peer discovery (subset of producers)
bootnodes = [
  "/ip4/10.0.1.2/tcp/30334",                  # val2
  "/ip4/10.0.1.3/tcp/30335",                  # val3
]

enable_mdns = false                            # Disable local multicast discovery (not needed)
enable_kad  = true                              # Enable Kademlia DHT for peer discovery
reconnect_s = 30                                # Reconnect interval to known peers (seconds)

# Connection limits
max_connections_total    = 200                  # Total inbound + outbound connections
max_connections_per_peer = 8                    # Max connections from same IP

# P2P state sync (fast bootstrap from peers)
enable_p2p_state_sync    = true                  # Enable state sync (recommended for RPC node)
state_sync_chunk_bytes   = 1048576               # Chunk size (1 MiB)
state_sync_timeout_s     = 15                    # Timeout per chunk request (seconds)

# Peer scoring (optional, helps avoid bad peers)
[network.scoring]
enable = true
decay_interval_s = 60                            # Score decay interval
trust_threshold = 0.8                             # Minimum score to trust a peer
ban_threshold = -100                               # Score below which peer is banned

# ------------------------------
# Mempool configuration
# ------------------------------
[mempool]
capacity = 200000                                 # Maximum number of pending transactions
max_tx_size_bytes = 1048576                        # Maximum transaction size (1 MiB)
cache_size = 10000                                 # Recently seen transactions cache (to avoid duplicates)
max_replace_tips = 100                             # Number of replacement candidates for RBF

# ------------------------------
# RPC server (public endpoint)
# ------------------------------
[rpc]
listen        = "0.0.0.0:9000"                     # PUBLIC — put reverse proxy in front!
enable_faucet = true                                # Testnet faucet (protected by rate limiting)

# Rate limiting (applied per IP if reverse proxy forwards client IP)
[rpc.rate_limit]
enabled = true
requests_per_second = 50                            # Average request rate
burst = 100                                          # Maximum burst
trusted_proxies = ["127.0.0.1", "::1"]              # Reverse proxy IPs (to get real client IP)

# CORS settings for browser access
[rpc.cors]
allowed_origins = ["*"]                              # Adjust in production (e.g., ["https://example.com"])
allowed_methods = ["GET", "POST"]
allowed_headers = ["Content-Type", "Authorization"]
max_age_seconds = 600

# Timeouts
[rpc.timeouts]
read_timeout_s = 30                                   # Maximum duration for reading request
write_timeout_s = 30                                  # Maximum duration for writing response
idle_timeout_s = 120                                  # Maximum idle time for keep-alive connections
max_body_bytes = 10485760                              # Max request body size (10 MiB)

# ------------------------------
# Storage (block and state persistence)
# ------------------------------
[storage]
enable_snapshots         = true                        # Enable periodic snapshots
snapshot_every_n_blocks  = 500                         # Take snapshot every N blocks
snapshot_keep            = 10                           # Number of snapshots to retain
snapshot_zstd_level      = 3                            # Compression level (1-22)

# Database tuning
[storage.db]
max_open_files = 1000                                   # Maximum open file descriptors
write_buffer_size_mb = 64                               # Memtable size (MB)
block_cache_size_mb = 128                                # Block cache size (MB)
compression = "snappy"                                   # Compression algorithm (none, snappy, zstd)

# ------------------------------
# Observability (metrics and tracing)
# ------------------------------
[observability]
enable_otel    = false                                   # OpenTelemetry tracing (disabled by default)
otel_endpoint  = "http://127.0.0.1:4317"                 # OTLP gRPC endpoint
service_name   = "iona-rpc"                              # Service name for traces/metrics

# Prometheus metrics endpoint
[observability.prometheus]
enabled = true
listen = "127.0.0.1:9101"                                # Internal metrics endpoint (not exposed)
namespace = "iona"

# Health check endpoint (for load balancers)
[observability.health]
enabled = true
listen = "127.0.0.1:8080"                                # Internal health endpoint
path = "/health"

# ------------------------------
# Signing (none for RPC node)
# ------------------------------
[signing]
mode = "local"                                           # No signing needed

# ------------------------------
# Logging (advanced)
# ------------------------------
[logging]
# Log to file (optional)
file_enabled = true
file_path = "/var/log/iona/rpc.log"
file_max_size_mb = 100                                    # Rotate after 100 MB
file_max_age_days = 7                                     # Keep logs for 7 days
file_max_backups = 10

# Structured logging (JSON)
format = "json"                                            # "json" or "plain"
level = "info"                                             # Overrides node.log_level

# ------------------------------
# Backup (optional, for automated backups)
# ------------------------------
[backup]
enabled = false
schedule_cron = "0 2 * * *"                               # Daily at 2 AM
target_dir = "/backup/iona"
keep_days = 30

# ------------------------------
# Performance profiling (pprof) – enable only for debugging
# ------------------------------
[pprof]
enabled = false
listen = "127.0.0.1:6060"
