# IONA v28 — Validator 4 (producer)
# Topology: val2, val3, val4 = producers; val1 = follower; rpc = public endpoint
# Chain: iona-testnet-1 (chain_id=6126151), launch=2026-03-01T12:00:00Z

[node]
data_dir  = "/var/lib/iona/val4"
seed      = 4
chain_id  = 6126151
log_level = "info"
keystore  = "encrypted"
keystore_password     = ""
keystore_password_env = "IONA_KEYSTORE_PASSWORD"

[consensus]
propose_timeout_ms   = 300
prevote_timeout_ms   = 200
precommit_timeout_ms = 200
max_txs_per_block    = 4096
gas_target           = 43000000
fast_quorum          = true
initial_base_fee     = 1
stake_each           = 1000
simple_producer      = true          # val4 IS a producer
validator_seeds      = [2, 3, 4]    # consensus participants (must match all nodes)

[network]
listen = "/ip4/0.0.0.0/tcp/30336"
# Peers: other producers + follower (NOT self)
peers = [
  "/ip4/10.0.1.2/tcp/30334",
  "/ip4/10.0.1.3/tcp/30335",
  "/ip4/10.0.1.1/tcp/30333",
]
bootnodes = [
  "/ip4/10.0.1.2/tcp/30334",
  "/ip4/10.0.1.3/tcp/30335",
]
enable_mdns = false
enable_kad  = true
reconnect_s = 30

max_connections_total    = 200
max_connections_per_peer = 8

[mempool]
capacity = 200000

[rpc]
listen        = "127.0.0.1:9004"     # local only, not public
enable_faucet = false

[storage]
enable_snapshots         = true
snapshot_every_n_blocks  = 500
snapshot_keep            = 10
snapshot_zstd_level      = 3

[observability]
enable_otel    = false
otel_endpoint  = "http://127.0.0.1:4317"
service_name   = "iona-val4"

[signing]
mode = "local"
