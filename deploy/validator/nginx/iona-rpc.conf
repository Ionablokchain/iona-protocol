# IONA RPC Reverse Proxy Configuration
# =====================================
# This nginx configuration proxies safe RPC endpoints to the public internet.
# The actual RPC server listens on 127.0.0.1:9001 (loopback only).
# This reverse proxy enforces rate limiting, security headers, and HTTPS.

# Upstream definition for the IONA RPC server
upstream iona_rpc {
    server 127.0.0.1:9001 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# Rate limiting zone: 100 requests per minute per IP
limit_req_zone $binary_remote_addr zone=iona_rpc_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=iona_health_nolimit:10m rate=1000r/m;

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS RPC Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL/TLS Configuration
    # =====================
    # Use modern TLS configuration: TLS 1.2 and 1.3 only
    ssl_protocols TLSv1.2 TLSv1.3;

    # Modern cipher suites: prioritize TLS 1.3 AEAD ciphers, then secure TLS 1.2 ciphers
    ssl_ciphers 'TLS13+AESGCM+AES256:TLS13+AESGCM+CHACHA20:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    # TLS session optimization
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # OCSP stapling for certificate validation
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Certificate paths (must be configured for your domain)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # HTTP Strict Transport Security: enforce HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers to prevent common attacks
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'none'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Custom access log format with request tracking
    log_format iona_rpc_log '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'req_id=$http_x_request_id response_time=$request_time';

    access_log /var/log/nginx/iona_rpc_access.log iona_rpc_log;
    error_log /var/log/nginx/iona_rpc_error.log warn;

    # Health check endpoint - no rate limiting, short timeout
    location = /health {
        limit_req zone=iona_health_nolimit burst=100 nodelay;

        proxy_pass http://iona_rpc;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Health check specific timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;

        access_log /var/log/nginx/iona_health_access.log iona_rpc_log;
    }

    # Main RPC endpoint with rate limiting and security controls
    location / {
        # Apply rate limiting: 100 req/min per IP, allow burst of 10
        limit_req zone=iona_rpc_limit burst=10 nodelay;

        # Deny direct access to /admin endpoints
        if ($uri ~ ^/admin) {
            return 403;
        }

        # Proxy to upstream IONA RPC server
        proxy_pass http://iona_rpc;

        # HTTP version and connection handling
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Headers to pass upstream
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id;

        # Request body size limit: 1MB max
        client_max_body_size 1m;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering settings for optimal performance
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Do not modify response headers
        proxy_pass_header Server;
    }

    # Explicitly deny /admin endpoints
    location ~ ^/admin {
        return 403;
    }
}
