# IONA Admin API Reverse Proxy Configuration
# ===========================================
# This nginx configuration provides secure access to the IONA admin API.
# Access is restricted via:
# 1. Listen only on internal management interface
# 2. Mutual TLS (mTLS) certificate verification
# 3. IP whitelist allow/deny rules
# This endpoint should never be exposed to the public internet.

# Admin endpoint server
server {
    # Listen only on localhost or management interface
    # For production, replace with management VIP or specific interface IP
    listen 127.0.0.1:8443 ssl http2;
    listen [::1]:8443 ssl http2;

    # Do NOT listen on 0.0.0.0 - admin must be restricted to management network

    server_name _;

    # TLS Configuration for mTLS
    # ==========================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'TLS13+AESGCM+AES256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;

    ssl_session_timeout 1d;
    ssl_session_cache shared:AdminSSL:10m;
    ssl_session_tickets off;

    # Server certificate
    ssl_certificate /etc/iona/certs/admin-server.crt;
    ssl_certificate_key /etc/iona/certs/admin-server.key;

    # Client certificate verification (mTLS)
    # Clients must present a valid certificate signed by the admin CA
    ssl_verify_client on;
    ssl_verify_depth 2;
    ssl_client_certificate /etc/iona/certs/admin-ca.crt;
    ssl_trusted_certificate /etc/iona/certs/admin-ca.crt;

    # Error page for failed mTLS
    error_page 495 = @mTLS_error;

    location @mTLS_error {
        return 403 "Client certificate verification failed";
    }

    # Logging
    access_log /var/log/nginx/iona_admin_access.log;
    error_log /var/log/nginx/iona_admin_error.log warn;

    # IP-based access control
    # Whitelist management IPs/subnets
    allow 127.0.0.1;
    allow ::1;
    # Allow from management VPN subnet (example)
    # allow 10.255.0.0/16;
    # Deny all other IPs
    deny all;

    # Admin API endpoints
    location / {
        proxy_pass http://127.0.0.1:9002;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Admin API timeouts (may need longer for operations)
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Larger buffer for admin responses
        client_max_body_size 10m;
    }
}
