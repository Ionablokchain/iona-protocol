[node]
chain_id = "iona-testnet-1"
data_dir = "/var/lib/iona"
seed = 3003
profile = "prod"

[network]
listen = "0.0.0.0:7001"
peers = [
  "validator-1:7001",
  "validator-2:7001",
  "validator-4:7001"
]
max_connections = 100
handshake_timeout_ms = 5000
message_buffer_size = 1024

[rpc]
listen = "0.0.0.0:9001"
enable_websocket = true
websocket_max_clients = 100
request_timeout_ms = 30000
cors_allowed_origins = ["*"]

[consensus]
propose_timeout_ms = 1000
prevote_timeout_ms = 1000
precommit_timeout_ms = 1000
commit_timeout_ms = 100
timeout_commit = 1000

[security]
rbac_enabled = true
audit_logging_enabled = true
audit_log_path = "/var/log/iona/audit.log"
max_audit_log_size_mb = 512
