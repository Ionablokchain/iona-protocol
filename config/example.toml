# IONA v28 node configuration — production‑ready
# All values shown are defaults. Adjust according to your deployment.

[node]
# Base directory for node data (database, snapshots, quarantines, keys)
data_dir = "./data/node1"

# Deterministic key seed (change per node). Used for local signing mode only.
# WARNING: Keep this secret in production. For testnet, any value works.
seed = 1

# Unique chain identifier (must match genesis)
chain_id = 6126151

# Log level: trace | debug | info | warn | error
log_level = "info"

# Keystore mode: plain (insecure) | encrypted (recommended for production)
keystore = "encrypted"

# Password for encrypted keystore (fallback if env var not set)
keystore_password = ""

# Environment variable name containing the keystore password
keystore_password_env = "IONA_KEYSTORE_PASSWORD"

# Maximum number of concurrent background tasks (e.g., snapshot generation)
max_concurrent_tasks = 256


[consensus]
# Timeouts (milliseconds) for each consensus step
propose_timeout_ms   = 300
prevote_timeout_ms   = 200
precommit_timeout_ms = 200

# Maximum number of transactions included in a block
max_txs_per_block = 4096

# EIP-1559 target gas per block
gas_target = 43_000_000

# If true, advance to next round as soon as 2/3+ votes are received (faster finality).
# In unstable networks, consider setting to false to avoid premature commits.
fast_quorum = true

# Initial base fee for EIP-1559
initial_base_fee = 1

# Stake assigned to each demo validator (only used in testnets with static validator sets)
stake_each = 1000

# Maximum age (in seconds) of evidence that will be accepted
max_evidence_age_s = 3600

# Minimum number of validators required to produce a block (safety threshold)
min_validator_count = 4

# Maximum rounds before giving up (avoids infinite loops)
max_rounds = 50

# Protocol version activation schedule (see UPGRADE_SPEC.md)
[[consensus.protocol_activations]]
protocol_version = 1
activation_height = 0
grace_blocks = 0

[[consensus.protocol_activations]]
protocol_version = 2
activation_height = 2_000_000
grace_blocks = 1000


[network]
# Listen address for P2P (multiaddr format)
listen = "/ip4/0.0.0.0/tcp/7001"

# Static peers (multiaddrs)
peers = [
  # "/ip4/1.2.3.4/tcp/7001/p2p/12D3KooW...",
]

# Bootnodes for peer discovery (must include peer ID)
bootnodes = [
  # "/dns4/node.example/tcp/7001/p2p/12D3KooW...",
]

# Enable mDNS for local network discovery (useful only for testing)
enable_mdns = false

# Enable Kademlia DHT for peer discovery
enable_kad = true

# Reconnect interval to static peers (seconds)
reconnect_s = 30

# Connection limits
max_connections_total = 200               # total inbound + outbound
max_connections_per_peer = 8              # prevent sybil from single IP

# Request-response protocol limits (per-peer, per-protocol)
[network.rr_limits]
max_req_per_sec_block  = 15
max_req_per_sec_status = 30
max_req_per_sec_range  = 5

max_bytes_per_sec_block  = 2_000_000       # 2 MB/s
max_bytes_per_sec_status = 200_000         # 200 KB/s
max_bytes_per_sec_range  = 4_000_000       # 4 MB/s

# Global bandwidth caps for request-response (bytes/sec)
global_in_bytes_per_sec  = 10_000_000      # 10 MB/s
global_out_bytes_per_sec = 10_000_000

# Peer scoring and quarantine settings
peer_strike_decay_s = 30                    # strikes decay every N seconds
peer_score_decay_s  = 60                    # score moves toward zero every N seconds
peer_quarantine_s   = 60                    # temporary quarantine duration

rr_strikes_before_quarantine = 2
rr_strikes_before_ban        = 3
rr_quarantines_before_ban    = 2

# Persist quarantine list to disk (data_dir/quarantine.json)
persist_quarantine = true


# Diversity and eclipse protection
[network.diversity]
# Bucket peers by /16 (IPv4) or first 4 bytes of IPv6 to resist Sybil attacks.
bucket_kind = "ip16"           # ip16 | ip24 | asn (ASN requires external mapping)
max_inbound_per_bucket = 4
max_outbound_per_bucket = 4
eclipse_detection_min_buckets = 3   # if we have fewer buckets, trigger reseed
reseed_cooldown_s = 60


# Gossipsub configuration
[network.gossipsub]
# Topic allowlist – messages on other topics are dropped
allowed_topics = ["iona/tx", "iona/blocks", "iona/evidence"]
deny_unknown_topics = true

# Local node publish limits
max_publish_msgs_per_sec = 50
max_publish_bytes_per_sec = 5_242_880      # 5 MiB/s

# Per-peer inbound limits (messages they forward to us)
max_in_msgs_per_sec = 100
max_in_bytes_per_sec = 10_485_760          # 10 MiB/s

# Optional per-topic overrides (uncomment and adjust as needed)
# [[network.gossipsub.topic_limits]]
# topic = "iona/tx"
# max_in_msgs_per_sec = 200
# max_in_bytes_per_sec = 10_485_760


# State sync security
[network.state_sync_security]
# Bind snapshot attestations to validator-set hash and epoch to prevent replay.
bind_validator_set = true
bind_epoch = true
attestation_epoch_s = 60                    # epoch length for attestation nonce

# If true, reject unsigned snapshots (required for mainnet)
require_attestation = false

# Use aggregated BLS signatures (requires feature flag "bls")
use_aggregated_signatures = false


# P2P state sync
enable_p2p_state_sync = true
state_sync_chunk_bytes = 1_048_576          # 1 MiB
state_sync_timeout_s = 15

# Snapshot attestation collection
enable_snapshot_attestation = true
snapshot_attestation_threshold = 2          # number of validators required
snapshot_attestation_collect_s = 8


[mempool]
# Maximum number of pending transactions
capacity = 200_000

# Maximum size of a single transaction (in bytes)
max_tx_size = 65_536                         # 64 KB

# Minimum and maximum gas prices (to prevent spam)
min_gas_price = 1
max_gas_price = 1_000_000

# Maximum priority fee per gas
max_priority_fee_per_gas = 100

# MEV protection (commit-reveal, threshold encryption, fair ordering)
[mev]
enable_commit_reveal = true
enable_threshold_encryption = true
enable_fair_ordering = true
ordering_jitter_ms = 50
commit_ttl_blocks = 20
backrun_delay_blocks = 1
max_pending_commits = 100_000


[rpc]
# SECURITY: bind to loopback by default.
# To expose publicly, set listen = "0.0.0.0:9001" AND pass --unsafe-rpc-public at startup.
listen = "127.0.0.1:9001"

# Enable faucet endpoint (ONLY for testnets)
enable_faucet = false

# CORS policy: false = restrictive (no cross-origin), true = allow-all (dev only)
cors_allow_all = false

# List of allowed origins when CORS is restricted (e.g., ["https://myexplorer.com"])
allowed_origins = []

# Rate limiting for RPC calls (requests per second, per IP)
rate_limit_per_ip = 100
rate_limit_burst = 200

# Maximum request size (bytes)
max_request_size = 10_485_760                # 10 MiB

# Timeout for RPC calls (seconds)
timeout_s = 30

# Maximum JSON nesting depth (prevents DoS via deep structures)
max_json_depth = 32


[storage]
# Enable snapshot generation
enable_snapshots = true

# Generate snapshot every N blocks
snapshot_every_n_blocks = 500

# Number of recent snapshots to keep
snapshot_keep = 10

# Zstd compression level (1-22, higher = better compression but slower)
snapshot_zstd_level = 3

# Database cache size (in MB) – adjust based on available RAM
db_cache_size_mb = 512

# Maximum number of concurrent I/O tasks
max_concurrent_tasks = 256

# Path to the block store (if separate from data_dir)
# block_store_path = "./data/node1/blocks"

# WAL (Write-Ahead Log) configuration
[storage.wal]
max_segment_bytes = 67_108_864              # 64 MiB
keep_segments = 3
fsync_every_write = true


[observability]
# Enable OpenTelemetry tracing (requires "otel" feature)
enable_otel = false

# OTLP endpoint (gRPC)
otel_endpoint = "http://127.0.0.1:4317"

# Service name for traces/metrics
service_name = "iona-node"

# Metrics export (Prometheus) – if enabled, expose /metrics on this address
# metrics_listen = "127.0.0.1:9100"


[signing]
# Signing mode: local (use seed) | remote (external signer)
mode = "local"

# Remote signer URL (only if mode = "remote")
remote_url = "https://127.0.0.1:9100"
remote_timeout_s = 10

# mTLS certificates for remote signer (recommended)
remote_tls_client_cert_pem = "./deploy/tls/client.crt.pem"
remote_tls_client_key_pem  = "./deploy/tls/client.key.pem"
remote_tls_ca_cert_pem     = "./deploy/tls/ca.crt.pem"
remote_tls_server_name     = "iona-remote-signer"


[governance]
# Minimum deposit required to submit a governance proposal (in base units)
min_deposit = 1_000_000

# Number of epochs for the voting period
voting_epochs = 100

# Quorum required (in basis points, 10000 = 100%)
quorum_bps = 3340        # 33.4%

# Threshold for passing (in basis points)
threshold_bps = 5000     # 50%


[economics]
# Annual inflation rate (basis points, 10000 = 100%)
base_inflation_bps = 500      # 5%

# Minimum stake required to become a validator (in base units)
min_stake = 10_000_000_000    # 10 billion

# Slashing percentage for double‑signing (basis points)
slash_double_sign_bps = 5000  # 50%

# Slashing percentage for downtime (basis points)
slash_downtime_bps = 100      # 1%

# Unbonding period (in epochs)
unbonding_epochs = 14

# Treasury share of block rewards (basis points)
treasury_bps = 500            # 5%


[protocol]
# Current protocol version (set by binary, not configurable)
# current_version = 2

# Supported protocol versions (set by binary)
# supported_versions = [1, 2]


[audit]
# Path to the audit log file (JSONL)
log_path = "./data/node/audit.jsonl"
# Maximum file size before rotation (bytes)
max_file_size_bytes = 104_857_600   # 100 MiB
# Number of rotated files to keep
rotate_count = 5
# Whether to also emit audit events via tracing
emit_to_tracing = true


# Optional: backup configuration
[backup]
enabled = false
schedule_cron = "0 2 * * *"           # daily at 2 AM
target_dir = "/backup/iona"
keep_days = 30
